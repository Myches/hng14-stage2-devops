name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

env:
  REGISTRY: localhost:5000
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1 — LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python (flake8)
        run: |
          flake8 api/main.py worker/worker.py \
            --max-line-length=120 \
            --extend-ignore=E501

      - name: Set up Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint JavaScript (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles (hadolint)
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  # ─────────────────────────────────────────────
  # STAGE 2 — TEST
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: api
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        working-directory: api
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage-report
          path: api/htmlcov/

  # ─────────────────────────────────────────────
  # STAGE 3 — BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0
        with:
          driver-opts: network=host

      - name: Build & push API image
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ github.sha }}
            ${{ env.REGISTRY }}/api:latest
          network: host

      - name: Build & push worker image
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/worker:latest
          network: host

      - name: Build & push frontend image
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/frontend:latest
          network: host

      - name: Save git SHA for downstream jobs
        run: echo "${{ github.sha }}" > sha.txt

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: build-sha
          path: sha.txt

  # ─────────────────────────────────────────────
  # STAGE 4 — SECURITY SCAN
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/download-artifact@v4.2.1
        with:
          name: build-sha

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Pull images from local registry
        run: |
          SHA=$(cat sha.txt)
          docker pull ${{ env.REGISTRY }}/api:$SHA
          docker pull ${{ env.REGISTRY }}/worker:$SHA
          docker pull ${{ env.REGISTRY }}/frontend:$SHA

      - name: Scan API image
        run: |
          SHA=$(cat sha.txt)
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output api-scan.sarif \
            ${{ env.REGISTRY }}/api:$SHA

      - name: Scan worker image
        run: |
          SHA=$(cat sha.txt)
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output worker-scan.sarif \
            ${{ env.REGISTRY }}/worker:$SHA

      - name: Scan frontend image
        run: |
          SHA=$(cat sha.txt)
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output frontend-scan.sarif \
            ${{ env.REGISTRY }}/frontend:$SHA

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ─────────────────────────────────────────────
  # STAGE 5 — INTEGRATION TEST
  # ─────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Create .env for compose
        run: echo "REDIS_PASSWORD=testpassword123" > .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for frontend to be healthy..."
          timeout 90 bash -c '
            until docker compose ps | grep "frontend" | grep "(healthy)"; do
              echo "  Still waiting..."
              sleep 5
            done
          '

      - name: Submit a job and poll until complete
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          JOB_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Submitted job: $JOB_ID"

          MAX_WAIT=30
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "  Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "✅ Job completed successfully!"
              exit 0
            fi
            sleep 3
            ELAPSED=$((ELAPSED + 3))
          done

          echo "❌ Job did not complete within ${MAX_WAIT}s"
          exit 1

      - name: Tear down stack (always runs)
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # STAGE 6 — DEPLOY (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Rolling Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Deploy via SSH rolling update
        uses: appleboy/ssh-action@v1.2.2
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: REDIS_PASSWORD
          script: |
            set -euo pipefail
            cd /opt/app

            git pull origin main

            echo "REDIS_PASSWORD=${REDIS_PASSWORD}" > .env

            for SERVICE in api worker frontend; do
              echo "==> Rolling update: $SERVICE"

              docker compose build $SERVICE

              docker compose up -d --no-deps --scale $SERVICE=2 --no-recreate $SERVICE

              NEW_CONTAINER=$(docker compose ps -q $SERVICE | tail -1)
              TIMEOUT=60
              ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                HEALTH=$(docker inspect --format='{{.State.Health.Status}}' $NEW_CONTAINER 2>/dev/null || echo "unknown")
                if [ "$HEALTH" = "healthy" ]; then
                  echo "  ✅ New $SERVICE container is healthy"
                  break
                fi
                echo "  Waiting for health... ($ELAPSED/$TIMEOUT)"
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done

              if [ "$HEALTH" != "healthy" ]; then
                echo "  ❌ Health check failed for $SERVICE — aborting, old container stays running"
                docker compose up -d --no-deps --scale $SERVICE=1 --no-recreate $SERVICE
                exit 1
              fi

              docker compose up -d --no-deps --scale $SERVICE=1 $SERVICE
              echo "  ✅ $SERVICE updated successfully"
            done

            echo "🎉 Deployment complete"
